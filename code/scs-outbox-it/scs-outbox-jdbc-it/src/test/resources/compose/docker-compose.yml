name: scs-outbox-jdbc-it
services:
  postgres:
    container_name: postgres
    image: postgres:16
    ports:
      - "5432"
    environment:
      - "POSTGRES_DB=postgres"
      - "POSTGRES_USER=postgres"
      - "POSTGRES_PASSWORD=postgres-pwd"
    volumes:
      - "./postgres/data:/docker-entrypoint-initdb.d"
    healthcheck:
      test: "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""
      start_period: 10s
      interval: 10s
      retries: 10
      timeout: 10s
    labels:
      org.springframework.boot.readiness-check.tcp.disable: true
      # Enable service connection
      org.springframework.boot.service-connection: postgres
  kafka:
    image: apache/kafka:3.8.1
    ports:
      - "30810:9092"
    environment:
      - "KAFKA_NODE_ID=1"
      - "KAFKA_PROCESS_ROLES=broker,controller"
      - "KAFKA_LISTENERS=OUTSIDE://0.0.0.0:9092,PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093"
      - "KAFKA_ADVERTISED_LISTENERS=OUTSIDE://localhost:30810,PLAINTEXT://kafka:29092"
      - "KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=OUTSIDE:PLAINTEXT,PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      - "KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT"
      - "KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093"
      - "KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER"
      - "KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1"
      - "KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0"
      - "KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1"
      - "KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1"
    volumes:
      - "./kafka:/tmp/data"
    labels:
      org.springframework.boot.readiness-check.tcp.disable: true