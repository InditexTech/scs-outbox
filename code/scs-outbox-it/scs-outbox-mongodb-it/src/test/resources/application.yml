logging:
  level:
    root: INFO
spring:
  application:
    name: scs-outbox-mongodb-it
  docker:
    compose:
      enabled: false
      file: classpath:compose/docker-compose.yml
      start:
        command: up
        log-level: debug
      stop:
        command: down
      skip:
        in-tests: true
  data:
    mongodb:
      database: docker-db
  cloud:
    function:
      definition: myConsumer
    stream:
      output-bindings: output
      bindings:
        myConsumer-in-0:
          destination: outbox
          group: outbox
        output:
          destination: outbox
          contentType: text/*;charset=UTF-8
      kafka:
        binder:
          brokers: localhost:30810
scs-outbox:
  bindings:
    inclusions: "output"
    exclusions: "myConsumer-in-0"
  publishing:
    after-commit: true
    scheduler:
      fixed-rate: 1000
    archive:
      enabled: true
      json-payload-enabled: false